aid: httpie
name: HTTPie
description: >-
  HTTPie is a user-friendly command-line and web-based HTTP client designed
  for interacting with APIs and web services. It provides an intuitive
  interface for crafting HTTP requests, inspecting responses, and managing
  sessions with persistent headers, authentication, and cookies.
